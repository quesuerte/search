apiVersion: v1
kind: ServiceAccount
metadata:
  name: ip-updater
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ip-updater
  namespace: default
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ip-updater
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ip-updater
subjects:
  - kind: ServiceAccount
    name: ip-updater
    namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: update-external-ip
  namespace: kube-system
spec:
  schedule: "* * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ip-updater
          containers:
            - name: update-ip
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -ec
                - |
                  set -o pipefail
                  IPV4=$(curl -sf -4 --retry 3 --retry-delay 5 --max-time 10 ifconfig.me || true)
                  IPV6=$(curl -sf -6 --retry 3 --retry-delay 5 --max-time 10 ifconfig.me || true)
                  if [ -z "${IPV4}" ] && [ -z "${IPV6}" ]; then
                    echo "ERROR: Could not determine any public IP address"
                    exit 1
                  fi
                  TARGET=$(printf '%s\n' "${IPV4}" "${IPV6}" | grep -v '^$' | paste -sd ',')
                  echo "Got target: $TARGET"

                  kubectl annotate gateway traefik-gateway --server=https://raspberrypi:6443 --overwrite external-dns.alpha.kubernetes.io/target="$TARGET" -n default
          hostNetwork: true
          restartPolicy: Never
