apiVersion: v1
kind: ServiceAccount
metadata:
  name: ip-updater
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ip-updater
  namespace: kube-system
rules:
  - apiGroups: ["helm.cattle.io"]
    resources: ["helmchartconfigs"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ip-updater
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ip-updater
subjects:
  - kind: ServiceAccount
    name: ip-updater
    namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: update-external-ip
  namespace: kube-system
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ip-updater
          containers:
            - name: update-ip
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -ec
                - |
                  set -o pipefail
                  CURRENT_IP=$(curl -sf --retry 3 --retry-delay 5 https://api.ipify.org)
                  cat <<EOF | kubectl apply -f -
                  apiVersion: helm.cattle.io/v1
                  kind: HelmChartConfig
                  metadata:
                    name: traefik
                    namespace: kube-system
                  spec:
                    valuesContent: |
                      providers:
                        kubernetesGateway:
                          enabled: true
                      service:
                        spec:
                          externalIPs:
                            - "$CURRENT_IP"
                        externalTrafficPolicy: Local
                      additionalArguments:
                        - "--providers.kubernetesIngress.allowExternalNameServices=true"
                  EOF
          restartPolicy: OnFailure
